<script>
    // Aggressive clearing function
    function clearAllInputs() {
        const allInputs = document.querySelectorAll('input, textarea, select');
        allInputs.forEach(el => {
            if (el.tagName === 'SELECT') {
                el.selectedIndex = 0;
            } else {
                el.value = '';
            }
        });
        // Reset forms as well
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        if (loginForm) loginForm.reset();
        if (registerForm) registerForm.reset();
    }

    // Clear immediately (before DOMContentLoaded)
    if (document.readyState === 'loading') {
        clearAllInputs();
    } else {
        clearAllInputs();
    }

    // Clear again after DOM is ready (catches autofill that happens later)
    document.addEventListener('DOMContentLoaded', function() {
        clearAllInputs();
        // Extra delay for Chrome's aggressive autofill
        setTimeout(clearAllInputs, 100);
        setTimeout(clearAllInputs, 500);
    });

    // Also on window load
    window.addEventListener('load', function() {
        clearAllInputs();
        setTimeout(clearAllInputs, 200);
    });

    // If logout parameter is present, clear storage and fields
    if (window.location.search.includes('logout=true')) {
        sessionStorage.clear();
        localStorage.removeItem('currentUser');
        clearAllInputs();
        const newUrl = window.location.pathname;
        window.history.replaceState({}, document.title, newUrl);
    }

    // Prevent back/forward cache from restoring
    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            clearAllInputs();
            setTimeout(clearAllInputs, 50);
        }
    });
</script>
