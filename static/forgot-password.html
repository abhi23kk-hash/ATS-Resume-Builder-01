<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | ATS Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="forgot-password.css">
    <style>
        /* Force error box to be visible when needed */
        .error-box.show-inline {
            display: flex !important;
            background-color: rgba(255, 71, 87, 0.1) !important;
            border: 1px solid rgba(255, 71, 87, 0.2) !important;
            padding: 10px !important;
            border-radius: 5px !important;
            margin-bottom: 15px !important;
        }
    </style>
</head>
<body id="forgot-password-page">
    
    <div class="stellar-bg">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
    </div>

    <div class="reset-container">
        <div class="glass-card">
            <div class="card-glow"></div>
            <div class="logo-area">
                <i class="fa-solid fa-user-shield brand-icon"></i>
            </div>

            <div id="step-1" class="reset-step active">
                <div class="card-header">
                    <h1>Identity <span class="accent-text">Check</span></h1>
                    <p>Enter your registered email ID to begin recovery</p>
                </div>
                
                <form id="forgot-form">
                    <div class="input-field">
                        <i class="fa-solid fa-envelope field-icon"></i>
                        <input type="email" id="forgot-email" placeholder="Email Address" required autocomplete="off">
                        <span class="focus-bar"></span>
                    </div>
                    
                    <!-- Error box – hidden by default -->
                    <div id="forgot-error" style="display: none;">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span id="forgot-error-text">Email not found in our system.</span>
                    </div>

                    <div id="forgot-success" style="display: none;">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>Reset link sent! Please check your inbox.</span>
                    </div>

                    <button type="submit" class="btn-stellar" id="forgot-submit">
                        <span>Send Reset Link</span>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                    
                    <a href="login.html" class="back-link"><i class="fa-solid fa-chevron-left"></i> Back to Login</a>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const forgotForm = document.getElementById('forgot-form');
             
            if (forgotForm) {
                forgotForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('forgot-email').value;
                    const errorBox = document.getElementById('forgot-error');
                    const successBox = document.getElementById('forgot-success');
                    const submitBtn = document.getElementById('forgot-submit');
                     
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<span>Processing...</span><i class="fa-solid fa-spinner fa-spin"></i>';

                    // Hide previous messages
                    errorBox.style.display = 'none';
                    successBox.style.display = 'none';

                    try {
                        const res = await fetch('/api/auth/forgot-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email })
                        });
                         
                        const data = await res.json();
                        
                        if (res.ok) {
                            successBox.style.display = 'block';
                            setTimeout(() => window.location.href = 'login.html', 3000);
                        } else {
                            // Show error message
                            const errorMsg = data.error || 'Identity not found.';
                            document.getElementById('forgot-error-text').innerText = errorMsg;
                            errorBox.classList.add('show-inline');
                            errorBox.style.display = 'block';
                        }
                    } catch (err) {
                        console.error(err);
                        document.getElementById('forgot-error-text').innerText = 'System error. Try again.';
                        errorBox.classList.add('show-inline');
                        errorBox.style.display = 'block';
                    } finally {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<span>Send Reset Link</span><i class="fa-solid fa-paper-plane"></i>';
                    }
                });
            }
        });
    </script>
</body>
</html>
