<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | ATS Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body id="login-page">
    
    <!-- Background Animated Shapes -->
    <div class="bg-shapes">
        <div class="shape shape-1" style="left: -10%; top: -10%;"></div>
        <div class="shape shape-2" style="right: -5%; top: 30%;"></div>
        <div class="shape shape-3" style="left: 20%; bottom: -20%;"></div>
    </div>

    <!-- Reset Container -->
    <div class="login-wrapper">
        <div class="login-card glass-panel tilt-card">
            <div class="login-header">
                <h2>Reset Password</h2>
                <p>Enter your <span class="gradient-text">New Credentials</span></p>
            </div>
            
            <form id="reset-form" class="form-container active">
                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="new-password" placeholder="New Password" required>
                    <div class="glow-border"></div>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-circle-check input-icon"></i>
                    <input type="password" id="confirm-password" placeholder="Confirm New Password" required>
                    <div class="glow-border"></div>
                </div>

                <div class="error-msg" id="reset-error">
                    <i class="fa-solid fa-circle-exclamation"></i> Passwords do not match.
                </div>
                
                <div class="success-msg" id="reset-success">
                    <i class="fa-solid fa-circle-check"></i> Password updated! Redirecting to login...
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-4">Update Password</button>
            </form>

        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('reset-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;
            const err = document.getElementById('reset-error');
            const success = document.getElementById('reset-success');

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                err.textContent = '❌ Invalid or missing reset token.';
                err.classList.add('show');
                return;
            }

            if (newPass !== confirmPass) {
                err.textContent = '❌ Passwords do not match.';
                err.classList.add('show');
                return;
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: newPass })
                });

                if (res.ok) {
                    // Destroy any existing session to force fresh login
                    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
                    
                    success.classList.add('show');
                    err.classList.remove('show');
                    setTimeout(() => {
                        window.location.href = 'login.html?reset=1';
                    }, 2500);
                } else {
                    const data = await res.json();
                    err.textContent = '❌ ' + (data.error || 'Failed to reset password.');
                    err.classList.add('show');
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
