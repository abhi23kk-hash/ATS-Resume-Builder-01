<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resumes | ATS Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .resumes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .resume-card {
            background: rgba(20, 25, 60, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(100, 150, 255, 0.15);
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .resume-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: rgba(68, 221, 255, 0.3);
        }
        .resume-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #4df;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .resume-meta {
            font-size: 0.75rem;
            color: #88a;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
        }
        .resume-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger {
            background: rgba(255, 51, 102, 0.2);
            border: 1px solid rgba(255, 51, 102, 0.3);
            color: #ff6680;
        }
        .btn-danger:hover {
            background: #ff3366;
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #88a;
        }
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-bar input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 15px;
            color: white;
        }
        .sort-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px;
            color: white;
        }
    </style>
</head>
<body id="my-resumes-page" class="layout-app">

<div class="bg-shapes" style="opacity: 0.6;">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
</div>

<aside class="sidebar premium-glass panel-glow">
    <div class="sidebar-header">
        <span class="logo-icon"><i class="fa-solid fa-file-contract neon-text-blue"></i></span>
        <span class="logo-text font-bold text-white">Resume<span class="neon-text-blue">Pro</span></span>
    </div>
    <div class="sidebar-profile">
        <div class="profile-img-container">
            <img src="https://via.placeholder.com/150" alt="Profile" id="side-profile-img">
        </div>
        <div class="profile-info">
            <h4 id="side-username">User Name</h4>
            <p>Premium Member</p>
        </div>
    </div>
    <ul class="sidebar-menu">
        <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
        <li><a href="builder.html"><i class="fa-solid fa-file-signature"></i> Create Resume</a></li>
        <li><a href="my-resumes.html" class="active"><i class="fa-solid fa-folder-open"></i> My Resumes</a></li>
        <li><a href="templates.html"><i class="fa-solid fa-layer-group"></i> ATS Templates</a></li>
    </ul>
</aside>

<main class="main-content">
    <header class="topbar">
        <div>
            <h2 class="neon-text-blue">My Resumes</h2>
            <p class="text-muted text-sm">Manage all your saved resumes</p>
        </div>
        <div class="topbar-actions">
            <a href="builder.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Create New Resume</a>
            <div class="theme-toggle">
                <button id="theme-switch"><i class="fa-solid fa-sun"></i></button>
            </div>
        </div>
    </header>

    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search by title...">
        <select id="sort-select" class="sort-select">
            <option value="date-desc">Newest First</option>
            <option value="date-asc">Oldest First</option>
            <option value="name-asc">Name A-Z</option>
            <option value="name-desc">Name Z-A</option>
            <option value="score-desc">Highest ATS Score</option>
        </select>
    </div>

    <div id="resumes-container" class="resumes-grid">
        <div class="empty-state">Loading your resumes...</div>
    </div>
</main>

<script>
    let allResumes = [];

    async function fetchResumes() {
        try {
            const res = await fetch('/api/resume/list', { credentials: 'include' });
            if (!res.ok) throw new Error('Failed to fetch resumes');
            const data = await res.json();
            allResumes = data;
            renderResumes();
        } catch (err) {
            console.error(err);
            document.getElementById('resumes-container').innerHTML = '<div class="empty-state">Error loading resumes. Please refresh.</div>';
        }
    }

    function renderResumes() {
        const searchTerm = document.getElementById('search-input').value.toLowerCase();
        const sortBy = document.getElementById('sort-select').value;
        let filtered = allResumes.filter(r => r.title.toLowerCase().includes(searchTerm));
        
        // Sort
        filtered.sort((a, b) => {
            if (sortBy === 'date-desc') return new Date(b.updatedAt) - new Date(a.updatedAt);
            if (sortBy === 'date-asc') return new Date(a.updatedAt) - new Date(b.updatedAt);
            if (sortBy === 'name-asc') return a.title.localeCompare(b.title);
            if (sortBy === 'name-desc') return b.title.localeCompare(a.title);
            if (sortBy === 'score-desc') return (b.score || 0) - (a.score || 0);
            return 0;
        });
        
        const container = document.getElementById('resumes-container');
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">No resumes found. <a href="builder.html" style="color:#4df;">Create your first resume</a></div>';
            return;
        }
        
        container.innerHTML = filtered.map(resume => `
            <div class="resume-card" data-id="${resume.id}">
                <div class="resume-title">${escapeHtml(resume.title)}</div>
                <div class="resume-meta">
                    <span><i class="fa-regular fa-calendar"></i> ${new Date(resume.updatedAt).toLocaleDateString()}</span>
                    <span><i class="fa-solid fa-chart-line"></i> ATS: ${resume.score || 0}/100</span>
                    <span><i class="fa-solid fa-download"></i> ${resume.downloads || 0}</span>
                </div>
                <div class="resume-actions">
                    <button class="btn-sm btn-neon" onclick="editResume('${resume.id}')"><i class="fa-solid fa-pen"></i> Edit</button>
                    <button class="btn-sm btn-outline" onclick="downloadResume('${resume.id}')"><i class="fa-solid fa-download"></i> Download</button>
                    <button class="btn-sm btn-danger" onclick="deleteResume('${resume.id}')"><i class="fa-solid fa-trash"></i> Delete</button>
                </div>
            </div>
        `).join('');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    window.editResume = function(id) {
        window.location.href = `builder.html?id=${id}`;
    };
    
    window.downloadResume = async function(id) {
        try {
            await fetch(`/api/resume/download/${id}`, { method: 'POST', credentials: 'include' });
            window.location.href = `builder.html?id=${id}&print=true`;
        } catch (err) {
            alert('Download failed');
        }
    };
    
    window.deleteResume = async function(id) {
        if (!confirm('Are you sure you want to delete this resume? This action cannot be undone.')) return;
        try {
            const res = await fetch(`/api/resume/${id}`, { method: 'DELETE', credentials: 'include' });
            if (res.ok) {
                allResumes = allResumes.filter(r => r.id !== id);
                renderResumes();
                // Also refresh stats on dashboard (optional)
            } else {
                alert('Delete failed');
            }
        } catch (err) {
            alert('Error deleting resume');
        }
    };
    
    document.getElementById('search-input').addEventListener('input', renderResumes);
    document.getElementById('sort-select').addEventListener('change', renderResumes);
    
    // Authentication check
    fetch('/api/auth/user', { credentials: 'include' })
        .then(res => res.json())
        .then(data => {
            if (!data.isLoggedIn) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('side-username').textContent = data.user.fullName || data.user.username;
                fetchResumes();
            }
        })
        .catch(() => window.location.href = 'login.html');
</script>
<script src="script.js"></script>
</body>
</html>
